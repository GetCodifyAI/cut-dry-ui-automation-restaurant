commands:
  install-dependencies:
    steps:
      - run:
          name: Aggressive Disk Cleanup
          command: |
            echo "Disk usage before cleanup:"
            df -h
            echo "Deleting old job dirs..."
            for i in $(seq 1 23); do
             rm -rf ~/project-job$i || true
            done
            echo "Removing Docker images and containers..."
            docker container prune -f || true
            docker image prune -af || true
            docker volume prune -f || true
            echo "Cleaning APT and TMP..."
            sudo apt-get clean
            sudo rm -rf /var/lib/apt/lists/*
            sudo rm -rf /tmp/*
            sudo rm -rf ~/.m2/repository || true
            sudo rm -rf ~/.cache ~/.config ~/.gradle || true
            sudo rm -rf ~/workspace || true
            sudo rm -rf /usr/lib/jvm/* || true
            sudo journalctl --vacuum-time=1d || true
            echo "Top large directories after cleanup:"
            du -h --max-depth=1 / | sort -hr | head -n 20
            echo "Disk usage after cleanup:"
            df -h
      - run:
          name: Check and Install Java 22 if not exists
          command: |
            if ! java -version 2>&1 | grep '22' >/dev/null; then
              echo "Java 22 not found. Installing..."
              sudo apt-get update && sudo apt-get install -y wget
              wget -q https://download.java.net/java/GA/jdk22/830ec9fcccef480bb3e73fb7ecafe059/36/GPL/openjdk-22_linux-x64_bin.tar.gz
              sudo mkdir -p /usr/lib/jvm
              sudo tar zxvf openjdk-22_linux-x64_bin.tar.gz -C /usr/lib/jvm
              sudo update-alternatives --install /usr/bin/java java /usr/lib/jvm/jdk-22/bin/java 2200
              sudo update-alternatives --set java /usr/lib/jvm/jdk-22/bin/java
              echo 'export PATH="/usr/lib/jvm/jdk-22/bin:$PATH"' >> $BASH_ENV
              source $BASH_ENV
            else
              echo "Java 22 is already installed."
              java -version
            fi

      - run:
          name: Check and Install Maven if not exists
          command: |
            if ! command -v mvn >/dev/null; then
              echo "Maven not found. Installing..."
              sudo apt-get install -y maven
            else
              echo "Maven already installed:"
              mvn -version
            fi

      - run:
          name: Check and Install Chrome if not exists
          command: |
            if ! command -v google-chrome >/dev/null; then
              echo "Chrome not found. Installing..."
              sudo rm -f /etc/apt/sources.list.d/google-chrome.list
              echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list > /dev/null
              wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
              sudo apt-get update
              sudo apt-get install -y google-chrome-stable
            else
              echo "Chrome already installed:"
              google-chrome --version
            fi


jobs:
  install-common-dependencies:
    executor: ec2-executor_8
    steps:
      - checkout
      - install-dependencies

  build-and-test:
    executor: ec2-executor
    working_directory: ~/project-job50
    steps:
      - checkout
      - attach_workspace:
          at: ~/
      - run:
          name: Build and run tests
          command: mvn clean test "-Dsurefire.suiteXmlFiles=bvt.xml" "-Drun.headless=true" "-Dtest.env=uat"
      - store_artifacts:
          path: target/surefire-reports
          destination: build-and-test-artifacts

  nightly-build-and-test-1:
    executor: ec2-executor_11
    working_directory: ~/project-job13
    steps:
      - checkout
      - attach_workspace:
          at: ~/
      - run:
          name: Build and run nightly tests
          command: mvn clean test "-Dsurefire.suiteXmlFiles=regression1.xml" "-Drun.headless=true" "-Dtest.env=uat" || true
      - store_artifacts:
          path: target/surefire-reports
          destination: daily-build-and-test-artifacts-1
      - run:
          name: Verify Test Results Exist
          command: ls -R target/surefire-reports || echo "Test results missing!"
      - run:
          name: Copy test results to workspace
          command: |
            mkdir -p ~/workspace
            PART_NAME="Part_One"
            for file in target/surefire-reports/TEST-*.xml; do
              [ -f "$file" ] && cp "$file" ~/workspace/${PART_NAME}_nightly-build-and-test-1_$(basename "$file")
            done
      - persist_to_workspace:
          root: ~/workspace
          paths:
            - Part_One_nightly-build-and-test-1_TEST-*.xml

